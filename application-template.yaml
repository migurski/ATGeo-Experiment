AWSTemplateFormatVersion: '2010-09-09'
Description: 'Application stack for ATGeo-Experiment - Lambda function and URL'

Parameters:
  BootstrapStackName:
    Type: String
    Default: atgeo-experiment-bootstrap
    Description: Name of the bootstrap stack to import resource names from

  ImageUri:
    Type: String
    Description: ECR image URI including tag for the Lambda function

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'atgeo-experiment-data-${AWS::Region}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: atgeo-experiment-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: atgeo-experiment-data-bucket-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub 'arn:aws:s3:::atgeo-experiment-data-${AWS::Region}-${AWS::AccountId}/*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: atgeo-experiment
      PackageType: Image
      Architectures:
        - arm64
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          DATA_BUCKET_NAME: !Ref DataBucket
      Code:
        ImageUri: !Ref ImageUri

  LambdaFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !Ref LambdaFunction

  LambdaFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

Outputs:
  FunctionUrl:
    Description: Public URL for the Lambda function
    Value: !GetAtt LambdaFunctionUrl.FunctionUrl

  DataBucketName:
    Description: Name of the S3 bucket for geotiff data files
    Value: !Ref DataBucket
