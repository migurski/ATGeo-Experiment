AWSTemplateFormatVersion: '2010-09-09'
Description: 'Application stack for ATGeo-Experiment - Lambda function and URL'

Parameters:
  BootstrapStackName:
    Type: String
    Default: atgeo-experiment-bootstrap
    Description: Name of the bootstrap stack to import resource names from

  ImageUri:
    Type: String
    Description: ECR image URI including tag for the Lambda function

  CppPackageKey:
    Type: String
    Description: S3 key for the C++ Lambda ZIP package in the deployment bucket

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'atgeo-experiment-data-${AWS::Region}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: atgeo-experiment-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: atgeo-experiment-data-bucket-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub 'arn:aws:s3:::atgeo-experiment-data-${AWS::Region}-${AWS::AccountId}/*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: atgeo-experiment
      PackageType: Image
      Architectures:
        - arm64
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          DATA_BUCKET_NAME: !Ref DataBucket
      Code:
        ImageUri: !Ref ImageUri

  LambdaFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !Ref LambdaFunction

  LambdaFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  LambdaFunctionCpp:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: atgeo-experiment-cpp
      PackageType: Zip
      Runtime: provided.al2023
      Handler: bootstrap
      Architectures:
        - arm64
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          DATA_BUCKET_NAME: !Ref DataBucket
      Code:
        S3Bucket: !ImportValue
          'Fn::Sub': '${BootstrapStackName}-DeploymentBucketName'
        S3Key: !Ref CppPackageKey

  LambdaFunctionCppUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !Ref LambdaFunctionCpp

  LambdaFunctionCppUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionCpp
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  CppCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: atgeo-experiment.teczno.com
      ValidationMethod: DNS

  CppCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: atgeo-experiment-cache-policy
        Comment: Cache forever keyed on lon+lat+geohash query params
        DefaultTTL: 3600   # 1 hour
        MinTTL: 0
        MaxTTL: 3600
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          QueryStringsConfig:
            QueryStringBehavior: whitelist
            QueryStrings:
              - lon
              - lat
              - geohash
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none

  CppCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
          - atgeo-experiment.teczno.com
        Comment: ATGeo Experiment C++ Lambda
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachePolicyId: !Ref CppCachePolicy
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
          TargetOriginId: CppLambdaOrigin
          ViewerProtocolPolicy: redirect-to-https
        Enabled: true
        HttpVersion: http2
        Origins:
          - Id: CppLambdaOrigin
            DomainName: !Select
              - 2
              - !Split ['/', !GetAtt LambdaFunctionCppUrl.FunctionUrl]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        ViewerCertificate:
          AcmCertificateArn: !Ref CppCertificate
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only

Outputs:
  FunctionUrl:
    Description: Direct Lambda URL for the Python function (for testing /dgg)
    Value: !GetAtt LambdaFunctionUrl.FunctionUrl

  FunctionCppUrl:
    Description: Direct Lambda URL for the C++ function (not publicly advertised)
    Value: !GetAtt LambdaFunctionCppUrl.FunctionUrl

  FunctionCppCustomDomain:
    Description: Custom domain URL for the C++ Lambda function
    Value: https://atgeo-experiment.teczno.com/

  CppCloudFrontDomain:
    Description: CloudFront domain name — create a CNAME from atgeo-experiment.teczno.com to this value
    Value: !GetAtt CppCloudFrontDistribution.DomainName

  DataBucketName:
    Description: Name of the S3 bucket for geotiff data files
    Value: !Ref DataBucket
